<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon</title>
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
        .h1{
            display: flex;
            justify-content: center;
            margin-top: 5%;
            margin-bottom: 4%;
            color: rgb(8, 8, 8);
            text-shadow: 10px 5px 10px rgb(239, 236, 236);
            font-size:xx-large;
            font-weight: 900;
        }
        .moon{
            height: 96vh;
            width: 98%;
            border: 2px solid black;
            margin-top: 2vh;
            margin-left: 1%;
            border-radius: 15px;
            background-color: #C59;
        }
        .pics{
            display: flex;
            justify-content: space-evenly;
            align-items: center;
            height: 50%;
            width: 80%;
            margin-left: 10%;
    
        }
        .names{
             display: flex;
            justify-content: space-evenly;
            align-items: center;
            margin-left: 0%;
            color: black;
            text-shadow: 10px 5px 10px rgb(239, 236, 236);
            font-size: large;
        }
        .pic1{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            border-radius: 15px;
            background-color: #320829;
            box-shadow: 15px 15px 15px rgb(12, 6, 7);
            
        }
        .pic1:hover{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            background-image: url(moon.jpeg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 25px 25px 25px rgb(8, 3, 4);
        }
        .pic2{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            border-radius: 15px;
            background-color: #320829;
            box-shadow: 15px 15px 15px rgb(13, 5, 6);
        }
        .pic2:hover{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            background-image: url(Little\ Princess.jpeg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 25px 25px 25px rgb(8, 3, 4);
        }
        .pic3{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            border-radius: 15px;
            background-color: #320829;
            box-shadow: 15px 15px 15px rgb(11, 5, 6);
        }
        .pic3:hover{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            background-image: url(cutie\ queen.jpeg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 25px 25px 25px rgb(8, 3, 4);
        }
        .pic4{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            border-radius: 15px;
            background-color: #320829;
            box-shadow: 15px 15px 15px rgb(15, 6, 7);
        }
        .pic4:hover{
            height: 80%;
            width: 20%;
            border: 1px solid black;
            background-image: url(Bangaram.jpeg);
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            box-shadow: 25px 25px 25px rgb(8, 3, 4);
        }
        .btn{
            display: flex;
            justify-content: end;
            margin-right: 5%;
            padding-top: 5%;
        }
        button{
            height: 45px;
            width: 150px;
            border-radius: 25px;
            background-color: black;
            box-shadow: 5px 3px 10px rgb(251, 249, 249);
        }
        a{
            text-decoration: none;
            color: orangered;
        }
    </style>
</head>
<body>
    <div class="moon">
        <h1 class="h1">Yor are the cutest ever  ✨ </h1>
        <p align="center">Click box to view</p>
        <div class="pics">
            <div class="pic1"></div>
            <div class="pic2"></div>
            <div class="pic3"></div>
            <div class="pic4"></div>
        </div>
        <div class="names">
            <h3> 🌙 Moon </h3>
            <h3> ❤️ Little Princess</h3>
            <h3>Cutie Queen 😎</h3>
            <h3>Bangaram 💕</h3>
        </div>
        <div class="btn">
            <button><a href="daji.html"><h3>continue</h3></a></button>
        </div>
        
    </div>
</body>
</html>
